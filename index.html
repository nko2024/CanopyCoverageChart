<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tree Plantings</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
  body {
    font-family: sans-serif;
    background-color: #f5f5f5;
    margin: 0;
  }

  .chart-wrapper {
    max-width: 800px;
    margin: 40px auto;
    background: #ffffff;
    padding: 24px;
    border-radius: 12px;
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #333;
    margin-bottom: 20px;
  }

  svg {
    width: 100%;
    height: auto;
  }

  .bar {
    fill: #3b6f9e;
  }

  .axis text {
    font-size: 12px;
    fill: #666;
  }

  .axis path,
  .axis line {
    display: none;
  }

  .target-line {
    stroke: #cc3333;
    stroke-width: 2;
    stroke-dasharray: 4;
  }

  .target-label {
    fill: #cc3333;
    font-size: 11px;
  }
</style>
</head>

<body>

<div class="chart-wrapper">
  <div class="title">TREE PLANTINGS BY YEAR</div>
  <svg viewBox="0 0 700 400"></svg>
</div>

<script>
const data = [
  { year: "2022", value: 12273 },
  { year: "2023", value: 14254 },
  { year: "2024", value: 16500 },
  { year: "2025", value: 18500 }
];

const target = 20000;

const svg = d3.select("svg"),
      margin = { top: 20, right: 20, bottom: 40, left: 60 },
      width = 700 - margin.left - margin.right,
      height = 400 - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

const x = d3.scaleBand()
  .domain(data.map(d => d.year))
  .range([0, width])
  .padding(0.35);

const y = d3.scaleLinear()
  .domain([0, 22000])
  .nice()
  .range([height, 0]);

// Y Axis
g.append("g")
  .attr("class", "axis")
  .call(d3.axisLeft(y).ticks(5))
  .call(g => g.select(".domain").remove());

// X Axis
g.append("g")
  .attr("class", "axis")
  .attr("transform", `translate(0,${height})`)
  .call(d3.axisBottom(x))
  .call(g => g.select(".domain").remove());

// Bars
g.selectAll(".bar")
  .data(data)
  .enter()
  .append("rect")
  .attr("class", "bar")
  .attr("x", d => x(d.year))
  .attr("y", d => y(d.value))
  .attr("width", x.bandwidth())
  .attr("height", d => height - y(d.value));

// Target line
g.append("line")
  .attr("class", "target-line")
  .attr("x1", 0)
  .attr("x2", width)
  .attr("y1", y(target))
  .attr("y2", y(target));

// Target label
g.append("text")
  .attr("class", "target-label")
  .attr("x", width - 90)
  .attr("y", y(target) - 6)
  .text("Target: 20,000");
</script>

</body>
</html>
