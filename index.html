<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree Plantings by Year</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f7f7f7;
    }

    .chart-container {
      width: 700px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .bar {
      fill: #3b6f9e;
    }

    .axis path,
    .axis line {
      stroke: #ccc;
    }

    .grid line {
      stroke: #eee;
    }

    .target-line {
      stroke: #d62728;
      stroke-dasharray: 4;
      stroke-width: 2;
    }

    .target-label {
      fill: #d62728;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="chart-container">
  <div class="title">TREE PLANTINGS BY YEAR</div>
  <svg width="660" height="400"></svg>
</div>

<script>
const data = [
  { year: "2022", value: 12273 },
  { year: "2023", value: 14254 },
  { year: "2024", value: 16500 }, // placeholder
  { year: "2025", value: 18500 }  // placeholder
];

const target = 20000;

const svg = d3.select("svg"),
      margin = { top: 20, right: 20, bottom: 40, left: 60 },
      width = +svg.attr("width") - margin.left - margin.right,
      height = +svg.attr("height") - margin.top - margin.bottom;

const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

const x = d3.scaleBand()
    .domain(data.map(d => d.year))
    .range([0, width])
    .padding(0.3);

const y = d3.scaleLinear()
    .domain([0, 22000])
    .nice()
    .range([height, 0]);

// Y Axis
g.append("g")
  .call(d3.axisLeft(y).ticks(5))
  .call(g => g.select(".domain").remove());

// X Axis
g.append("g")
  .attr("transform", `translate(0,${height})`)
  .call(d3.axisBottom(x))
  .call(g => g.select(".domain").remove());

// Bars
g.selectAll(".bar")
  .data(data)
  .enter()
  .append("rect")
  .attr("class", "bar")
  .attr("x", d => x(d.year))
  .attr("y", d => y(d.value))
  .attr("width", x.bandwidth())
  .attr("height", d => height - y(d.value));

// Target line
g.append("line")
  .attr("class", "target-line")
  .attr("x1", 0)
  .attr("x2", width)
  .attr("y1", y(target))
  .attr("y2", y(target));

// Target label
g.append("text")
  .attr("class", "target-label")
  .attr("x", width - 60)
  .attr("y", y(target) - 5)
  .text("Target: 20,000");
</script>

</body>
</html>
